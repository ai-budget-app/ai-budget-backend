services:
  mongo:
    image: mongo:7
    container_name: ai-budget-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secure_password
      MONGO_INITDB_DATABASE: zenny
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: .
    container_name: ai-budget-backend
    restart: unless-stopped
    depends_on:
      - mongo
    ports:
      - "5000:5000"
    environment:
      MONGO_URI: mongodb://admin:secure_password@mongo:27017/zenny?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-local_dev_secret}
      PORT: ${PORT:-5000}
      NODE_ENV: ${NODE_ENV:-development}

volumes:
  mongo_data:
